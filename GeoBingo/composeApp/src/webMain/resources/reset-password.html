<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passwort zuruecksetzen - KatchIt!</title>
    <meta name="robots" content="noindex, nofollow">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #050508; color: #F0ECFF;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; padding: 24px;
        }
        .container {
            background: #0C0B15; border: 1px solid #2E1F50; border-radius: 16px;
            padding: 40px; max-width: 420px; width: 100%; text-align: center;
        }
        h1 {
            font-size: 28px; font-weight: 800; margin-bottom: 8px;
            background: linear-gradient(135deg, #F43F5E, #D946EF, #A855F7);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .subtitle { color: #CBB8F0; font-size: 14px; margin-bottom: 24px; }
        input {
            background: #15132A; border: 1px solid #2E1F50; border-radius: 12px;
            padding: 14px 16px; color: #F0ECFF; font-size: 16px; width: 100%;
            outline: none; margin-bottom: 12px;
        }
        input:focus { border-color: #D946EF; }
        input::placeholder { color: #5A3D8A; }
        .btn {
            background: linear-gradient(135deg, #F43F5E, #D946EF, #A855F7);
            color: #fff; border: none; border-radius: 12px; padding: 14px;
            font-size: 16px; font-weight: 700; cursor: pointer; width: 100%;
            margin-top: 8px;
        }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .error { color: #FF4D6D; font-size: 13px; margin-top: 8px; display: none; }
        .success { color: #22C55E; font-size: 14px; margin-top: 12px; display: none; }
        .back-link { color: #5A3D8A; font-size: 13px; margin-top: 16px; display: block; text-decoration: none; }
        .back-link:hover { color: #CBB8F0; }
        .loading { display: none; color: #CBB8F0; font-size: 14px; margin-top: 12px; }
    </style>
</head>
<body>

<div class="container">
    <h1>KatchIt!</h1>

    <!-- Error state: no token -->
    <div id="no-token" style="display:none;">
        <p class="subtitle">Ungueltiger oder abgelaufener Link. Bitte fordere einen neuen Link an.</p>
        <a href="https://katchit.app" class="back-link">Zurueck zu KatchIt!</a>
    </div>

    <!-- Reset form -->
    <div id="reset-form">
        <p class="subtitle">Gib dein neues Passwort ein</p>
        <input type="password" id="new-password" placeholder="Neues Passwort" autofocus>
        <input type="password" id="confirm-password" placeholder="Passwort bestaetigen">
        <p class="error" id="error-msg"></p>
        <button class="btn" id="reset-btn" onclick="resetPassword()">Passwort speichern</button>
        <p class="loading" id="loading-msg">Wird gespeichert...</p>
    </div>

    <!-- Success state -->
    <div id="success-state" style="display:none;">
        <p class="success" style="display:block;">Passwort wurde erfolgreich geaendert!</p>
        <p class="subtitle" style="margin-top:12px;">Du kannst dich jetzt mit deinem neuen Passwort in der App anmelden.</p>
        <a href="https://katchit.app" class="back-link">Zurueck zu KatchIt!</a>
    </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const supabaseUrl = 'https://itkmtovubmhkqtguzeex.supabase.co';
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml0a210b3Z1Ym1oa3F0Z3V6ZWV4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NTc2NjIsImV4cCI6MjA4OTEzMzY2Mn0.sH0-CL7V58UaCyqLGkGKp36CLIn15uOHbTV7HN2G0MY';
const supabase = createClient(supabaseUrl, supabaseKey);

// Parse the access token from URL hash
const hash = window.location.hash.substring(1);
const params = new URLSearchParams(hash);
const accessToken = params.get('access_token');
const refreshToken = params.get('refresh_token');
const type = params.get('type');

if (!accessToken) {
    document.getElementById('reset-form').style.display = 'none';
    document.getElementById('no-token').style.display = 'block';
} else {
    // Set the session with the recovery token
    supabase.auth.setSession({ access_token: accessToken, refresh_token: refreshToken || '' });
}

window.resetPassword = async function() {
    const newPw = document.getElementById('new-password').value;
    const confirmPw = document.getElementById('confirm-password').value;
    const errorEl = document.getElementById('error-msg');
    const loadingEl = document.getElementById('loading-msg');
    const btn = document.getElementById('reset-btn');

    errorEl.style.display = 'none';

    if (newPw.length < 6) {
        errorEl.textContent = 'Passwort muss mindestens 6 Zeichen lang sein';
        errorEl.style.display = 'block';
        return;
    }
    if (newPw !== confirmPw) {
        errorEl.textContent = 'Passwoerter stimmen nicht ueberein';
        errorEl.style.display = 'block';
        return;
    }

    btn.disabled = true;
    loadingEl.style.display = 'block';

    try {
        const { error } = await supabase.auth.updateUser({ password: newPw });
        if (error) {
            errorEl.textContent = error.message;
            errorEl.style.display = 'block';
            btn.disabled = false;
            loadingEl.style.display = 'none';
        } else {
            document.getElementById('reset-form').style.display = 'none';
            document.getElementById('success-state').style.display = 'block';
        }
    } catch (e) {
        errorEl.textContent = 'Fehler: ' + e.message;
        errorEl.style.display = 'block';
        btn.disabled = false;
        loadingEl.style.display = 'none';
    }
};

document.getElementById('confirm-password').addEventListener('keydown', e => {
    if (e.key === 'Enter') window.resetPassword();
});
</script>
</body>
</html>
