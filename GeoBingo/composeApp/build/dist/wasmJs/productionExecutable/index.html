<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KatchIt!</title>
    <link type="text/css" rel="stylesheet" href="styles.css">

    <!-- AdSense: Script fuer Verifizierung im Head, aber Ads pausiert bis Consent -->
    <script>
        (window.adsbygoogle = window.adsbygoogle || []).pauseAdRequests = 1;
    </script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4871207394525716"
            crossorigin="anonymous"></script>
</head>
<body>

    <!-- TOP BANNER -->
    <div id="ad-top" class="ad-slot ad-slot-top" aria-hidden="true"></div>

    <!-- GAME CANVAS -->
    <div id="app"></div>

    <!-- BOTTOM BANNER -->
    <div id="ad-bottom" class="ad-slot ad-slot-bottom" aria-hidden="true"></div>

    <!-- DSGVO Consent Banner -->
    <div id="consent-banner" style="display:none" role="dialog" aria-label="Cookie-Einstellungen">
        <div id="consent-banner-inner">
            <p id="consent-text">
                KatchIt! nutzt auf dieser Seite Werbung von Google AdSense,
                um den kostenlosen Betrieb zu finanzieren. Darf Google Cookies
                setzen und personalisierte Werbung anzeigen?
                <a href="/datenschutz.html" style="color:#84CC16">Datenschutz</a>
            </p>
            <div id="consent-buttons">
                <button id="consent-decline" onclick="handleConsent(false)">Ablehnen</button>
                <button id="consent-accept" onclick="handleConsent(true)">Akzeptieren</button>
            </div>
        </div>
    </div>

    <!-- Footer Links -->
    <div id="legal-footer">
        <a href="/impressum.html">Impressum</a>
        <a href="/datenschutz.html">Datenschutz</a>
    </div>

    <!-- Compose App -->
    <script type="module" src="composeApp.js"></script>

    <!-- DSGVO-konforme Consent-Logik: kein AdSense vor Einwilligung -->
    <script>
        var AD_CONSENT_KEY = 'katchit_ad_consent';
        var adsLoaded = false;

        function handleConsent(accepted) {
            localStorage.setItem(AD_CONSENT_KEY, accepted ? '1' : '0');
            document.getElementById('consent-banner').style.display = 'none';
            if (accepted) showAds();
            recalcAppHeight();
        }

        function resumeAds() {
            if (adsLoaded) return;
            adsLoaded = true;
            // Pause aufheben — AdSense darf jetzt Cookies setzen und Ads laden
            (window.adsbygoogle = window.adsbygoogle || []).pauseAdRequests = 0;
        }

        function fillAdSlot(slotId, adSlot) {
            var container = document.getElementById(slotId);
            if (container.querySelector('.adsbygoogle')) return;
            var ins = document.createElement('ins');
            ins.className = 'adsbygoogle';
            ins.style.display = 'block';
            ins.setAttribute('data-ad-client', 'ca-pub-4871207394525716');
            ins.setAttribute('data-ad-slot', adSlot);
            ins.setAttribute('data-ad-format', 'auto');
            ins.setAttribute('data-full-width-responsive', 'true');
            container.appendChild(ins);
            (window.adsbygoogle = window.adsbygoogle || []).push({});
        }

        function showAds() {
            document.getElementById('ad-top').classList.add('ad-visible');
            document.getElementById('ad-bottom').classList.add('ad-visible');
            document.getElementById('ad-top').removeAttribute('aria-hidden');
            document.getElementById('ad-bottom').removeAttribute('aria-hidden');
            resumeAds();
            fillAdSlot('ad-top', '7285123562');
            fillAdSlot('ad-bottom', '5972041897');
            recalcAppHeight();
            // Hoehe nochmal anpassen wenn Ads gerendert sind
            setTimeout(recalcAppHeight, 500);
        }

        function recalcAppHeight() {
            var topH = document.getElementById('ad-top').classList.contains('ad-visible')
                ? document.getElementById('ad-top').offsetHeight : 0;
            var botH = document.getElementById('ad-bottom').classList.contains('ad-visible')
                ? document.getElementById('ad-bottom').offsetHeight : 0;
            document.getElementById('app').style.height =
                'calc(100dvh - ' + topH + 'px - ' + botH + 'px)';
        }

        // Init: gespeicherten Consent pruefen
        (function init() {
            var stored = localStorage.getItem(AD_CONSENT_KEY);
            if (stored === '1') {
                // Consent wurde bereits erteilt
                showAds();
            } else if (stored === null) {
                // Erster Besuch — Banner anzeigen
                document.getElementById('consent-banner').style.display = '';
            }
            // stored === '0' → abgelehnt, kein Banner, keine Ads
            recalcAppHeight();
        })();

        window.addEventListener('resize', recalcAppHeight);
    </script>
</body>
</html>
